- name: Create directories
  file:
    path: '~/qubo/src'
    state: directory

- name: Insert/Update configuration block in bashrc
  blockinfile:
    path: '~/.bashrc'
    marker: "# {mark} ANSIBLE MANAGED BLOCK"
    block: |
      export QUBO_PATH=~/qubo
      export GAZEBO_MODEL_PATH="$QUBO_PATH/src/qubo_gazebo/nbrf:$GAZEBO_MODEL_PATH"
      source "$QUBO_PATH/devel/setup.bash"

- name: Initialize and build catkin workspace
  block:
    - name: Run `catkin init`
      shell: source /opt/ros/melodic/setup.bash && catkin init
      args:
        executable: /bin/bash
        chdir: ~/qubo
    - name: Run `catkin build`
      shell: source /opt/ros/melodic/setup.bash && catkin build
      args:
        executable: /bin/bash
        chdir: ~/qubo
